<!DOCTYPE html>
<html>
<head>
    <title>Rise & Dine | Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-gold { background: #212529; border-bottom: 4px solid #ffc107; }
        .food-card img { height: 180px; object-fit: cover; background: #eee; }
        .btn-add { background: #198754; color: white; border: none; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark nav-gold px-4 shadow-sm">
    <a class="navbar-brand fw-bold" href="/dashboard">☀️ Rise & Dine</a>
    <div class="ms-auto">
        <a href="/cart" class="btn btn-warning btn-sm fw-bold me-2">Cart</a>
        <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <form action="/dashboard" method="GET" class="row mb-5 justify-content-center">
        <div class="col-md-6 d-flex shadow-sm p-0">
            <input type="text" name="search" class="form-control border-0 rounded-0" placeholder="Search for flavors...">
            <button class="btn btn-warning rounded-0 px-4 fw-bold">Search</button>
        </div>
    </form>

    <div class="row">
        {% for item in menu %}
        <div class="col-md-3 mb-4">
            <div class="card h-100 border-0 shadow-sm food-card overflow-hidden">
                <img src="{{ item.image_url }}" onerror="this.src='https://ui-avatars.com/api/?name={{ item.name }}&background=ffc107&color=212529';">
                <div class="card-body">
                    <span class="badge bg-dark mb-2" style="font-size: 0.6rem;">{{ item.category }}</span>
                    <h6 class="fw-bold mb-1">{{ item.name }}</h6>
                    <p class="text-success fw-bold small">Rs. {{ item.price }}</p>
                    <a href="/add/{{ item.item_id }}" class="btn btn-add btn-sm w-100">Add to Cart</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
