<!DOCTYPE html>
<html>
<head>
    <title>Rise & Dine | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #fdfcf0; display: flex; align-items: center; min-height: 100vh; }
        .logo-box { background: #212529; color: #ffc107; padding: 20px; border-radius: 15px 15px 0 0; text-align: center; }
        .card { border-radius: 15px; border: none; max-width: 400px; margin: auto; }
        .btn-gold { background: #ffc107; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow-lg">
        <div class="logo-box">
            <h1 class="mb-0">☀️ Rise & Dine</h1>
            <small class="text-uppercase tracking-widest">Premium Food Ordering</small>
        </div>
        <div class="card-body p-4">
            {% with msgs = get_flashed_messages() %}{% if msgs %}{% for m in msgs %}
                <div class="alert alert-info py-2 small">{{ m }}</div>
            {% endfor %}{% endif %}{% endwith %}
            <form action="/auth" method="POST">
                <input type="hidden" name="action" value="login">
                <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                <button class="btn btn-gold w-100 shadow-sm">Login</button>
            </form>
            <hr>
            <form action="/auth" method="POST">
                <input type="hidden" name="action" value="register">
                <div class="input-group input-group-sm">
                    <input type="text" name="username" class="form-control" placeholder="New User" required>
                    <input type="password" name="password" class="form-control" placeholder="New Pass" required>
                    <button class="btn btn-dark">Register</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
