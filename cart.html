<!DOCTYPE html>
<html>
<head>
    <title>Rise & Dine | Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px;">
    <div class="card border-0 shadow-lg p-4">
        <h3 class="fw-bold mb-4">Order Summary</h3>
        <ul class="list-group list-group-flush mb-4">
            {% for i in cart %}<li class="list-group-item d-flex justify-content-between">
                {{ i.name }} <span>Rs. {{ i.price }}</span>
            </li>{% endfor %}
            <li class="list-group-item d-flex justify-content-between fw-bold fs-5">
                Total <span>Rs. {{ total }}</span>
            </li>
        </ul>
        <form action="/pay" method="POST">
            <label class="small fw-bold mb-2">Select Payment</label>
            <select name="method" class="form-select mb-4">
                <option value="JazzCash">JazzCash</option>
                <option value="Card">Credit Card</option>
                <option value="PayPal">PayPal</option>
            </select>
            <button class="btn btn-dark w-100 py-2">Confirm Order</button>
        </form>
        <a href="/dashboard" class="btn btn-link w-100 mt-2 text-muted small">Cancel & Go Back</a>
    </div>
</div>
</body>
</html>
